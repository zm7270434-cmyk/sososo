name: Bug report
description: Report a problem with sososo
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please do **not** include API keys or other secrets.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
      placeholder: When I click Finish during recording, the window…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Start a recording with system audio + mic
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown in the installer / release you downloaded, or the commit you built from.
      placeholder: 0.1.0 or commit sha
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Audio capture (mic / system)
        - Live transcription (Deepgram)
        - AI summary (OpenAI)
        - UI / window
        - Settings / API keys
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console output or screenshots, if any. Redact anything sensitive.
    validations:
      required: false
