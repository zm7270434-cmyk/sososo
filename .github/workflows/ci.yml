name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Only the latest run per ref needs to finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Build on all targets: WASAPI (Windows), cpal/CoreAudio (macOS) and libpulse
    # (Linux) audio backends are cfg-gated, so each only compiles on its own OS —
    # clippy here is how the macOS and Linux backends are verified (they can't be
    # cross-compiled from Windows).
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: ESLint
        run: bun run lint

      - name: Frontend tests
        run: bun test

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The screencapturekit crate's Swift bridge (and its apple-* deps) target
      # the newest macOS SDK; the runner's default Xcode (16.x, macOS 15 SDK) is
      # too old to compile it, so select the latest stable Xcode instead.
      - name: Select latest Xcode
        if: matrix.os == 'macos-latest'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Tauri (WebKitGTK) + libpulse system libraries so the Linux audio backend
      # and Tauri itself compile under clippy.
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libpulse-dev

      - name: rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      # Typecheck + build the frontend. This also produces ../dist, which the
      # Rust build (tauri::generate_context!) embeds, so it must run before clippy.
      - name: Typecheck + build frontend
        run: bun run build

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      # The release ships a universal macOS binary, so make sure the Intel half
      # keeps compiling too (the Swift bridge cross-compiles per target).
      - name: Check x86_64-apple-darwin
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-apple-darwin

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # JS/TS dependency advisories (npm advisory DB).
      - name: bun audit
        run: bun audit

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Rust dependency advisories (RustSec). RUSTSEC-2024-0429 (glib VariantStrIter
      # unsoundness) is ignored: glib 0.18 is pinned transitively by gtk 0.18 ←
      # tauri 2.11, so no fixed release is reachable until Tauri bumps its GTK stack,
      # and the affected iterator is not used by this app. Revisit on the next Tauri bump.
      - name: cargo audit
        run: cargo audit --file src-tauri/Cargo.lock --ignore RUSTSEC-2024-0429

  commitlint:
    name: Commit lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
