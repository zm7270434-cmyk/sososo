name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Only the latest run per ref needs to finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Windows-only: audio capture uses WASAPI, and the app bundles for Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      # Typecheck + build the frontend. This also produces ../dist, which the
      # Rust build (tauri::generate_context!) embeds, so it must run before clippy.
      - name: Typecheck + build frontend
        run: bun run build

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets
