name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Only the latest run per ref needs to finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Build on all targets: WASAPI (Windows), cpal/CoreAudio (macOS) and libpulse
    # (Linux) audio backends are cfg-gated, so each only compiles on its own OS —
    # clippy here is how the macOS and Linux backends are verified (they can't be
    # cross-compiled from Windows).
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: ESLint
        run: bun run lint

      - name: Frontend tests
        run: bun test

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Tauri (WebKitGTK) + libpulse system libraries so the Linux audio backend
      # and Tauri itself compile under clippy.
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libpulse-dev

      - name: rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      # Typecheck + build the frontend. This also produces ../dist, which the
      # Rust build (tauri::generate_context!) embeds, so it must run before clippy.
      - name: Typecheck + build frontend
        run: bun run build

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
