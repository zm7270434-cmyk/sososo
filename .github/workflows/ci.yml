name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Only the latest run per ref needs to finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Build on both targets: WASAPI (Windows) and cpal/CoreAudio (macOS) audio
    # backends are cfg-gated, so each only compiles on its own OS — clippy here is
    # how the macOS backend is verified (it can't be cross-compiled from Windows).
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      # Typecheck + build the frontend. This also produces ../dist, which the
      # Rust build (tauri::generate_context!) embeds, so it must run before clippy.
      - name: Typecheck + build frontend
        run: bun run build

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets
