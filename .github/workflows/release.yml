name: Release

# Tag a version to publish, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# A draft GitHub Release is created with the Windows installer, the macOS
# (universal .dmg/.app) bundle and the Linux (.deb/.AppImage) bundle attached;
# review it and click "Publish".
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # The asset names produced below are linked directly from README.md →
        # "Download" (via /releases/latest/download/<name>). Keep them in sync —
        # renaming an asset here without updating the README will 404 those
        # links. Names are intentionally version-less so the README auto-tracks
        # the latest release and never needs a per-release edit.
        include:
          - os: windows-latest
            args: ''
            # OS-clear asset names, e.g. sososo_windows_x64-setup.exe / _x64.msi.
            assetNamePattern: 'sososo_windows_[arch][setup][ext]'
          - os: macos-latest
            # Universal binary so the .dmg runs on both Apple Silicon and Intel.
            args: '--target universal-apple-darwin'
            # e.g. sososo_macos_universal.dmg
            assetNamePattern: 'sososo_macos_[arch][ext]'
          - os: ubuntu-latest
            args: ''
            # e.g. sososo_linux_amd64.deb / .AppImage / .rpm
            assetNamePattern: 'sososo_linux_[arch][ext]'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Apple universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Tauri (WebKitGTK) + libpulse system libraries needed to build the Linux bundle.
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libpulse-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional): Windows https://v2.tauri.app/distribute/sign/windows/
          # and macOS https://v2.tauri.app/distribute/sign/macos/ — add the secrets here.
        with:
          # Empty on workflow_dispatch -> builds without creating a release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('sososo {0}', github.ref_name) || '' }}
          releaseBody: 'See the assets below to download and install. Builds are not code-signed yet, so the OS may warn on first run (Windows SmartScreen / macOS Gatekeeper — on macOS, right-click the app and choose Open).'
          releaseDraft: true
          prerelease: false
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
          # Per-OS asset names (defined in the matrix) so downloads are clearly labeled.
          assetNamePattern: ${{ matrix.assetNamePattern }}
          uploadWorkflowArtifacts: true
