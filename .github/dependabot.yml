version: 2

# Dependabot is configured for SECURITY UPDATES ONLY.
#
# Routine version-bump PRs are disabled via `open-pull-requests-limit: 0`
# (the GitHub-documented way to opt out of version updates per ecosystem).
# Dependabot still opens PRs for known security vulnerabilities, driven by
# Dependabot alerts + security updates (enabled in the repo settings).
#
# The package-ecosystem / directory entries are kept so security updates know
# where each manifest lives. Do NOT add `target-branch` here — that would turn
# off security-update support for the ecosystem.
updates:
  # Rust crates (Tauri backend)
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: 'chore(deps)'

  # Frontend npm dependencies (managed with Bun)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: 'chore(deps)'

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: 'ci(deps)'
